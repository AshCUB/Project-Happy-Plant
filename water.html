<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <div class="container">
    <div class="content">
      <div class="PTW">
        <h3>Press to Water</h3>
      </div>
      <div class="WB" onclick="activateButton(this)">
        <img src="water_button.png" alt="watering button" style="width:50%">
      </div>
    </div>

    <a class="home-link" href="main.html">home</a>
  </div>

  <script>
    let secs = Number(localStorage.getItem("pumpSeconds") || 1);
    document.getElementById("secsDisplay").innerHTML = secs;

    function activateButton(el) {
      el.classList.add('active');
      setTimeout(() => {
        el.classList.remove('active');
      }, secs * 1000); // convert secs to milliseconds
    }
  </script>
</body>
</html>
