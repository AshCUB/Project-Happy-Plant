<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet" />
</head>
<body>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <div class="container">
    <div class="content2">
      <h3>Pump Water for</h3>

      <div class="number-input" min="1" max="60" step="1" value="1">
        <button type="button" class="btn" onclick="decrease()">
          <span class="material-icons-outlined">remove</span>
        </button>
        <div class="value">
          <span class="number">1</span>
        </div>
        <button type="button" class="btn" onclick="increase()">
          <span class="material-icons-outlined">add</span>
        </button>
      </div>

      <h3>Secs</h3>
    </div>
    <a class="home-link" href="main.html">home</a>
  </div>

  <script>
    let input = document.querySelector(".number-input");
    const min = Number(input.getAttribute("min"));
    const max = Number(input.getAttribute("max"));
    const step = Number(input.getAttribute("step") || 1);
    let number = document.querySelector(".number");

    // Load saved value or fall back to default
    var value = Number(localStorage.getItem("pumpSeconds") || input.getAttribute("value") || 1);
    number.innerHTML = value;

    function saveValue() {
      localStorage.setItem("pumpSeconds", value);
    }

    function increase() {
      if (max) {
        if (value < max && value + step <= max) value += step;
      } else {
        value += step;
      }
      number.innerHTML = value;
      saveValue();
    }

    function decrease() {
      if (min) {
        if (value > min && value - step >= min) value -= step;
      } else {
        value -= step;
      }
      number.innerHTML = value;
      saveValue();
    }
  </script>
</body>
</html>
